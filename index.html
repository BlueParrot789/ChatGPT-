<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Peak Platformer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <h1>Pixel Peak</h1>
    <p class="instructions">Move: Arrow Keys / A,D • Jump: Space / W / Up • Reach the goal flag.</p>
    <canvas id="game" width="960" height="540" aria-label="Platformer game"></canvas>
    <p id="status" role="status">Collect coins and avoid hazards!</p>
  </main>
  <script src="game.js"></script>
</body>
</html>
